<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Matches - IPL Analytics</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body { font-family: 'Segoe UI'; background-color: #f8f9fa; }
        .navbar { background: linear-gradient(135deg, #1a3a52 0%, #2d5f7f 100%); }
        .live-badge { background: #dc3545; color: white; padding: 0.25rem 0.75rem; border-radius: 20px; font-size: 0.8rem; font-weight: bold; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .match-card { background: white; padding: 2rem; border-radius: 10px; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border-left: 4px solid #ff6b35; }
        .match-status { font-size: 1.1rem; font-weight: bold; color: #1a3a52; margin-bottom: 1rem; }
        .team-name { font-size: 1.3rem; font-weight: bold; color: #ff6b35; }
        .vs-text { color: #999; font-weight: 600; padding: 0 1rem; }
        .section-title { font-size: 1.8rem; font-weight: bold; color: #1a3a52; margin: 2rem 0 1.5rem 0; }
        .footer { background: #1a3a52; color: white; text-align: center; padding: 2rem; margin-top: 3rem; }
        .match-info { display: flex; align-items: center; justify-content: space-between; margin: 1rem 0; }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏏 IPL Analytics</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/live"><span class="live-badge">🔴 LIVE</span></a></li>
                <li class="nav-item"><a class="nav-link" href="/rankings">Rankings</a></li>
                <li class="nav-item"><a class="nav-link" href="/champions">Champions</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="container" style="padding: 2rem 0;">
    <h1 style="font-size: 2.5rem; font-weight: bold; color: #1a3a52; margin-bottom: 0.5rem;">
        <i class="fas fa-play-circle"></i> Live Matches
    </h1>
    <p style="color: #666; margin-bottom: 2rem;">IPL 2026 Season - Current Matches</p>

    <!-- Matches List -->
    <div id="matchesList" class="mb-4"></div>

    <!-- No Matches Message -->
    <div id="noMatches" style="display: none;">
        <div class="alert alert-info" role="alert">
            <i class="fas fa-info-circle"></i> No live matches at the moment. Check back later!
        </div>
    </div>

    <!-- Recent Matches Section -->
    <h2 class="section-title">Recent Matches</h2>
    <div id="recentMatches"></div>

</div>

<!-- Footer -->
<footer class="footer">
    <p>&copy; 2024 IPL Big Data Analytics | Live Match Updates</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function loadLiveMatches() {
        fetch('/api/live-matches')
            .then(res => res.json())
            .then(data => displayLiveMatches(data))
            .catch(err => console.error('Error:', err));
    }

    function displayLiveMatches(matches) {
        if (!matches || matches.length === 0) {
            document.getElementById('noMatches').style.display = 'block';
            document.getElementById('matchesList').innerHTML = '';
            return;
        }

        const matchesHtml = matches.map((match, index) => `
            <div class="match-card">
                <div class="match-status">
                    <span class="live-badge">🔴 LIVE</span>
                    Match ${index + 1} - Season ${match.season}
                </div>
                <div class="match-info" style="font-size: 1.5rem;">
                    <div class="team-name">${match.batting_team}</div>
                    <div class="vs-text">vs</div>
                    <div class="team-name">${match.bowling_team}</div>
                </div>
                <div style="color: #666; font-size: 0.95rem; margin-top: 1rem;">
                    <p><strong>Status:</strong> ${match.winner === 'In Progress' ? '⚡ Match in Progress' : `✅ ${match.winner} Won`}</p>
                    <p><strong>Match ID:</strong> ${match.match_id}</p>
                </div>
                <a href="#" class="btn btn-sm btn-primary mt-2">
                    <i class="fas fa-eye"></i> View Scorecard
                </a>
            </div>
        `).join('');

        document.getElementById('matchesList').innerHTML = matchesHtml;
    }

    function loadRecentMatches() {
        fetch('/api/live-matches')
            .then(res => res.json())
            .then(data => {
                if (data && data.length > 0) {
                    const recentHtml = data.slice(0, 3).map(match => `
                        <div class="card mb-3">
                            <div class="card-body">
                                <h5 class="card-title">
                                    ${match.batting_team} <span style="color: #999;">vs</span> ${match.bowling_team}
                                </h5>
                                <p class="card-text">
                                    <span class="badge bg-success">${match.winner}</span>
                                </p>
                            </div>
                        </div>
                    `).join('');
                    document.getElementById('recentMatches').innerHTML = recentHtml;
                }
            })
            .catch(err => console.error('Error:', err));
    }

    // Load data on page load
    loadLiveMatches();
    loadRecentMatches();

    // Refresh every 30 seconds
    setInterval(loadLiveMatches, 30000);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seasonal Rankings - IPL Analytics</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🏏 IPL Analytics</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/compare">Compare Players</a></li>
                    <li class="nav-item"><a class="nav-link" href="/rankings">Rankings</a></li>
                    <li class="nav-item"><a class="nav-link" href="/records">Records</a></li>
                    <li class="nav-item"><a class="nav-link" href="/champions">Champions</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1 class="mb-4">📊 IPL Seasonal Rankings</h1>

        <!-- Season Selector -->
        <div class="mb-4">
            <label for="seasonSelect" class="form-label">Select Season:</label>
            <select id="seasonSelect" class="form-select" onchange="loadSeason()">
                <option value="">Choose a season...</option>
            </select>
        </div>

        <!-- Rankings Tables -->
        <div class="row">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header"><h5>🏏 Top Batsmen</h5></div>
                    <div class="card-body">
                        <table class="table table-sm table-hover" id="batsmenTable">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Player</th>
                                    <th>Runs</th>
                                    <th>SR</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header"><h5>🎯 Top Bowlers</h5></div>
                    <div class="card-body">
                        <table class="table table-sm table-hover" id="bowlersTable">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Player</th>
                                    <th>Wickets</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p>&copy; 2024 IPL Big Data Analytics</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allRankings = {};

        // Load all rankings
        fetch('/api/seasonal-rankings')
            .then(res => res.json())
            .then(data => {
                allRankings = data;
                populateSeasonSelect();
            })
            .catch(err => console.error('Error:', err));

        function populateSeasonSelect() {
            const select = document.getElementById('seasonSelect');
            const seasons = Object.keys(allRankings).sort();
            seasons.forEach(season => {
                const option = document.createElement('option');
                option.value = season;
                option.textContent = `Season ${season}`;
                select.appendChild(option);
            });
            if (seasons.length > 0) {
                select.value = seasons[seasons.length - 1];
                loadSeason();
            }
        }

        function loadSeason() {
            const season = document.getElementById('seasonSelect').value;
            if (!season || !allRankings[season]) return;

            const ranking = allRankings[season];
            const batsmen = ranking.top_batsmen || [];
            const bowlers = ranking.top_bowlers || [];

            // Batsmen table
            const batsmenHTML = batsmen.map(b => `
                <tr>
                    <td><strong>${b.rank}</strong></td>
                    <td><a href="/player/${encodeURIComponent(b.name)}" class="text-decoration-none">${b.name}</a></td>
                    <td>${b.runs}</td>
                    <td>${b.strike_rate}</td>
                </tr>
            `).join('');
            document.getElementById('batsmenTable').querySelector('tbody').innerHTML = batsmenHTML;

            // Bowlers table
            const bowlersHTML = bowlers.map(b => `
                <tr>
                    <td><strong>${b.rank}</strong></td>
                    <td><a href="/player/${encodeURIComponent(b.name)}" class="text-decoration-none">${b.name}</a></td>
                    <td>${b.wickets}</td>
                </tr>
            `).join('');
            document.getElementById('bowlersTable').querySelector('tbody').innerHTML = bowlersHTML;
        }
    </script>
</body>
</html>
